<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPORTGRAM ULTRA | Real-Time Social</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --p: #ff4500; --p-h: #ff5714; --p-s: rgba(255, 69, 0, 0.15);
            --bg: #010409; --c-dark: #0d1117; --c-light: #161b22;
            --brd: #30363d; --text: #f0f6fc; --text-m: #8b949e;
            --grad: linear-gradient(135deg, #ff4500 0%, #ff8c00 100%);
            --shd: 0 8px 32px rgba(0,0,0,0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        .app-shell { max-width: 500px; margin: 0 auto; min-height: 100vh; display: none; }
        
        /* HEADER */
        .header {
            position: fixed; top: 0; width: 100%; max-width: 500px; height: 70px;
            background: rgba(1, 4, 9, 0.85); backdrop-filter: blur(20px);
            display: none; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000; border-bottom: 1px solid var(--brd);
        }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--p); font-style: italic; letter-spacing: -1px; }
        .logo span { color: white; }

        /* VIEWS */
        .view { display: none; padding: 85px 15px 120px 15px; min-height: 100vh; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }

        /* CARDS */
        .post-card { 
            background: var(--c-dark); border-radius: 24px; border: 1px solid var(--brd); 
            margin-bottom: 20px; overflow: hidden; box-shadow: var(--shd);
        }
        .post-header { padding: 12px 15px; display: flex; align-items: center; gap: 12px; }
        .avatar { width: 42px; height: 42px; border-radius: 14px; object-fit: cover; background: var(--p-s); }
        .post-media img { width: 100%; display: block; max-height: 400px; object-fit: cover; }
        .post-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; background: rgba(255,255,255,0.03); padding: 15px 0; border-bottom: 1px solid var(--brd); text-align: center; }
        .metric b { display: block; color: var(--p); font-size: 1.1rem; }
        .metric span { font-size: 0.6rem; color: var(--text-m); text-transform: uppercase; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: grid; place-items: center; padding: 30px; }
        .auth-box { background: var(--c-dark); padding: 40px; border-radius: 30px; border: 1px solid var(--brd); width: 100%; max-width: 400px; text-align: center; }
        input, select { width: 100%; background: var(--bg); border: 1px solid var(--brd); padding: 12px; border-radius: 12px; color: white; margin-top: 10px; outline: none; }
        .btn-prime { background: var(--grad); color: white; width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 20px; }

        /* NAV BAR */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; max-width: 500px; height: 80px;
            background: rgba(1, 4, 9, 0.92); backdrop-filter: blur(15px);
            display: none; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--brd); z-index: 1000;
        }
        .nav-tab { color: var(--text-m); display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; }
        .nav-tab.active { color: var(--p); }
        .main-plus { width: 55px; height: 55px; background: var(--grad); border-radius: 20px; color: white; display: grid; place-items: center; margin-top: -35px; border: 4px solid var(--bg); }

        /* MODALS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; place-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--c-dark); width: 100%; max-width: 400px; border-radius: 30px; padding: 30px; border: 1px solid var(--brd); }

        #toast { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: var(--p); color: white; padding: 12px 24px; border-radius: 50px; font-weight: 700; z-index: 3000; display: none; }
    </style>
</head>
<body>

    <div id="toast">¡Publicado! 🚀</div>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="logo" style="margin-bottom: 20px; font-size: 2rem;">SPORT<span>GRAM</span></div>
            <input type="email" id="auth-email" placeholder="Correo electrónico">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            <button class="btn-prime" onclick="handleAuth('login')">ENTRAR</button>
            <p style="margin-top: 20px; font-size: 0.8rem; color: var(--text-m);">
                ¿Nuevo? <span onclick="handleAuth('signup')" style="color: var(--p); cursor: pointer; font-weight: 700;">Crea una cuenta</span>
            </p>
        </div>
    </div>

    <header class="header">
        <div class="logo">SPORT<span>GRAM</span></div>
        <i class="fa-solid fa-right-from-bracket" onclick="logout()" style="color: var(--text-m);"></i>
    </header>

    <div class="app-shell">
        <section id="home" class="view active">
            <div id="main-feed"></div>
        </section>

        <section id="stats" class="view">
            <h2 style="margin-bottom: 20px;">Tu Actividad</h2>
            <div style="background: var(--c-dark); padding: 20px; border-radius: 24px; border: 1px solid var(--brd);">
                <canvas id="chartActivities"></canvas>
            </div>
        </section>

        <section id="profile" class="view">
            <div style="text-align: center;">
                <img id="u-avatar" src="" style="width: 90px; height: 90px; border-radius: 30px; border: 3px solid var(--p);">
                <h2 id="u-name" style="margin-top: 10px;">Cargando...</h2>
                <div style="display: flex; justify-content: space-around; margin-top: 20px;">
                    <div><b id="p-count">0</b><p style="font-size: 0.7rem;">POSTS</p></div>
                </div>
            </div>
        </section>
    </div>

    <nav class="nav-bar">
        <div class="nav-tab active" onclick="navigate('home', this)"><i class="fa-solid fa-house"></i><span>Feed</span></div>
        <div class="main-plus" onclick="showModal('modal-post')"><i class="fa-solid fa-plus"></i></div>
        <div class="nav-tab" onclick="navigate('profile', this)"><i class="fa-solid fa-user"></i><span>Perfil</span></div>
    </nav>

    <div id="modal-post" class="modal">
        <div class="modal-content">
            <h3>Nuevo Entreno</h3>
            <input type="text" id="post-desc" placeholder="¿Qué tal el entreno?">
            <input type="number" id="post-dist" placeholder="Distancia (km)">
            <input type="number" id="post-time" placeholder="Tiempo (min)">
            <select id="post-type">
                <option value="Running">Running 🏃‍♂️</option>
                <option value="Ciclismo">Ciclismo 🚴</option>
                <option value="Gym">Gym 🏋️</option>
            </select>
            <button class="btn-prime" onclick="handleNewPost()">PUBLICAR</button>
            <p onclick="closeModal('modal-post')" style="text-align: center; margin-top: 15px; color: var(--text-m); cursor: pointer;">Cancelar</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN DE FIREBASE (RELLENA ESTO)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "tu-proyecto.firebaseapp.com",
            projectId: "tu-proyecto",
            storageBucket: "tu-proyecto.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // AUTH
        window.handleAuth = async (mode) => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if (mode === 'signup') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert(e.message); }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const authScreen = document.getElementById('auth-screen');
            const appShell = document.querySelector('.app-shell');
            const header = document.querySelector('.header');
            const nav = document.querySelector('.nav-bar');

            if (user) {
                currentUser = user;
                authScreen.style.display = 'none';
                appShell.style.display = 'block';
                header.style.display = 'flex';
                nav.style.display = 'flex';
                initApp();
            } else {
                authScreen.style.display = 'grid';
                appShell.style.display = 'none';
                header.style.display = 'none';
                nav.style.display = 'none';
            }
        });

        // POSTS
        window.handleNewPost = async () => {
            const desc = document.getElementById('post-desc').value;
            const dist = document.getElementById('post-dist').value;
            const time = document.getElementById('post-time').value;
            const type = document.getElementById('post-type').value;

            if (!desc || !dist) return;

            await addDoc(collection(db, "posts"), {
                uid: currentUser.uid,
                user: currentUser.email.split('@')[0],
                avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser.uid}`,
                desc, dist, time, type,
                img: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=600",
                kudos: [],
                createdAt: serverTimestamp()
            });
            closeModal('modal-post');
            showToast();
        };

        function initApp() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderFeed(posts);
                updateProfile(posts);
            });
        }

        function renderFeed(posts) {
            document.getElementById('main-feed').innerHTML = posts.map(p => `
                <div class="post-card">
                    <div class="post-header">
                        <img src="${p.avatar}" class="avatar">
                        <div><b>${p.user}</b><p style="font-size:0.7rem; color:var(--text-m)">${p.type}</p></div>
                    </div>
                    <div class="post-media"><img src="${p.img}"></div>
                    <div class="post-metrics">
                        <div class="metric"><b>${p.dist}</b><span>km</span></div>
                        <div class="metric"><b>${p.time}</b><span>min</span></div>
                        <div class="metric"><b>${p.kudos?.length || 0}</b><span>Kudos</span></div>
                    </div>
                    <div class="post-footer" style="padding:15px;">
                        <i class="${p.kudos?.includes(currentUser.uid) ? 'fa-solid' : 'fa-regular'} fa-heart" 
                           style="color:${p.kudos?.includes(currentUser.uid) ? 'var(--p)' : 'white'}; font-size:1.4rem;" 
                           onclick="toggleKudo('${p.id}', ${p.kudos?.includes(currentUser.uid)})"></i>
                        <p style="margin-top:10px;"><strong>${p.user}</strong> ${p.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        window.toggleKudo = async (id, liked) => {
            const ref = doc(db, "posts", id);
            await updateDoc(ref, { kudos: liked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid) });
        };

        function updateProfile(posts) {
            const mine = posts.filter(p => p.uid === currentUser.uid);
            document.getElementById('u-name').innerText = currentUser.email.split('@')[0];
            document.getElementById('u-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser.uid}`;
            document.getElementById('p-count').innerText = mine.length;
        }

        // NAVIGATION & UI
        window.navigate = (id, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        window.showModal = (id) => document.getElementById(id).classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        function showToast() {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
