<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SPORTGRAM | Real App</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --p: #ff4500; --bg: #010409; --c: #0d1117; --brd: #30363d; --t: #f0f6fc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--t); overflow-x: hidden; }
        
        /* Pantalla de Login */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--c); padding: 35px; border-radius: 25px; border: 1px solid var(--brd); width: 100%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--brd); background: #000; color: #fff; outline: none; }
        .btn-prime { width: 100%; padding: 15px; border-radius: 15px; border: none; background: linear-gradient(135deg, #ff4500, #ff8c00); color: #fff; font-weight: 800; cursor: pointer; margin-top: 15px; }

        /* App Layout */
        .app { display: none; padding: 70px 15px 100px; max-width: 500px; margin: 0 auto; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(1,4,9,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--brd); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: var(--c); border-top: 1px solid var(--brd); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }

        /* Posts */
        .post { background: var(--c); border-radius: 20px; border: 1px solid var(--brd); margin-bottom: 20px; overflow: hidden; animation: fadeIn 0.5s ease; }
        .post-user { padding: 15px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .post-user img { width: 35px; border-radius: 10px; background: var(--p); }
        .post-metrics { display: flex; justify-content: space-around; padding: 15px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--brd); }
        .metric b { color: var(--p); display: block; font-size: 1.2rem; }
        .post-content { padding: 15px; line-height: 1.5; }

        /* Modales */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="color:var(--p); margin-bottom:10px; font-style:italic;">SPORTGRAM</h1>
            <p style="color:var(--t-m); font-size:0.9rem; margin-bottom:20px;">Red social de entrenamiento</p>
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn-prime" onclick="authAction('login')">ENTRAR</button>
            <button class="btn-prime" style="background:transparent; border:1px solid var(--brd); margin-top:10px;" onclick="authAction('signup')">REGISTRARSE</button>
        </div>
    </div>

    <header id="app-header" style="display:none;">
        <div style="font-weight:900; color:var(--p); font-size:1.4rem;">SG</div>
        <div id="user-display" style="font-size:0.8rem; font-weight:700;"></div>
        <i class="fa-solid fa-power-off" onclick="firebase.auth().signOut()"></i>
    </header>

    <div class="app" id="app-body">
        <div id="feed-container"></div>
    </div>

    <nav class="nav" id="app-nav" style="display:none;">
        <i class="fa-solid fa-house" style="color:var(--p)"></i>
        <div onclick="toggleModal(true)" style="background:var(--p); width:50px; height:50px; border-radius:18px; display:grid; place-items:center; color:white; cursor:pointer;">
            <i class="fa-solid fa-plus"></i>
        </div>
        <i class="fa-solid fa-chart-simple"></i>
    </nav>

    <div id="modal">
        <div class="auth-box">
            <h3>Nuevo Entrenamiento</h3>
            <input type="text" id="p-desc" placeholder="¿Qué tal el entreno?">
            <input type="number" id="p-dist" placeholder="Distancia (km)">
            <button class="btn-prime" onclick="uploadPost()">PUBLICAR</button>
            <p onclick="toggleModal(false)" style="margin-top:15px; cursor:pointer; color:#8b949e;">Cancelar</p>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN REAL INTEGRADA
        const firebaseConfig = {
            apiKey: "AIzaSyBDd2uV73I7wamZfy73uStcubwL8Kp2jmA",
            authDomain: "sportgram-1806a.firebaseapp.com",
            projectId: "sportgram-1806a",
            storageBucket: "sportgram-1806a.firebasestorage.app",
            messagingSenderId: "1099396048945",
            appId: "1:1099396048945:web:0ab081cc688a4c4e364d10",
            measurementId: "G-HKPN55HEQZ"
        };

        // Inicializar
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Lógica de Usuario
        function authAction(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("Rellena todos los campos");

            if(type === 'login') {
                auth.signInWithEmailAndPassword(e, p).catch(err => alert("Error: " + err.message));
            } else {
                auth.createUserWithEmailAndPassword(e, p).catch(err => alert("Error: " + err.message));
            }
        }

        // Observar estado de sesión
        auth.onAuthStateChanged(user => {
            const loggedIn = !!user;
            document.getElementById('auth-screen').style.display = loggedIn ? 'none' : 'flex';
            document.getElementById('app-body').style.display = loggedIn ? 'block' : 'none';
            document.getElementById('app-header').style.display = loggedIn ? 'flex' : 'none';
            document.getElementById('app-nav').style.display = loggedIn ? 'flex' : 'none';

            if(user) {
                document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                listenFeed();
            }
        });

        // Publicar en Firestore
        function uploadPost() {
            const desc = document.getElementById('p-desc').value;
            const dist = document.getElementById('p-dist').value;
            const user = auth.currentUser;

            if(!desc || !dist) return alert("Faltan datos");

            db.collection("posts").add({
                uid: user.uid,
                username: user.email.split('@')[0],
                desc: desc,
                dist: dist,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                toggleModal(false);
                document.getElementById('p-desc').value = "";
                document.getElementById('p-dist').value = "";
            }).catch(err => alert("Error al publicar: " + err.message));
        }

        // Cargar Feed en tiempo real
        function listenFeed() {
            db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snap => {
                const container = document.getElementById('feed-container');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="post">
                            <div class="post-user">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${data.uid}">
                                <span>@${data.username}</span>
                            </div>
                            <div class="post-metrics">
                                <div class="metric"><b>${data.dist}</b><span>Kms</span></div>
                                <div class="metric"><b><i class="fa-regular fa-heart"></i></b><span>Kudos</span></div>
                            </div>
                            <div class="post-content">${data.desc}</div>
                        </div>
                    `;
                });
            });
        }

        function toggleModal(show) { document.getElementById('modal').style.display = show ? 'flex' : 'none'; }
    </script>
</body>
</html>
